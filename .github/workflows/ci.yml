name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  starters:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate catalogue
        run: node catalogue-check.mjs
      - name: Verify shared fixtures
        working-directory: fixtures
        run: node --test
      - name: Verify React public starter
        working-directory: starters/react
        run: |
          npm ci
          npm run lint
          npm test
          npm run build
      - name: Verify Node Express starter
        working-directory: starters/express
        run: |
          npm ci
          npm run lint
          npm test
          npm run start:check
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify Django starter
        working-directory: starters/django
        run: |
          python -m pip install -r requirements.txt
          python manage.py check
          python manage.py test
      - name: Scan source and builds for sensitive artifacts
        run: node security-scan.mjs
      - name: Validate Compose configuration
        env:
          REACT_MYDATUM_CLIENT_ID: ci-public-client
          NODE_MYDATUM_CLIENT_ID: ci-node-client
          NODE_MYDATUM_CLIENT_SECRET: ci-node-client-secret
          NODE_SESSION_SECRET: ci-node-session-secret-that-is-at-least-32-characters
          DJANGO_MYDATUM_CLIENT_ID: ci-django-client
          DJANGO_MYDATUM_CLIENT_SECRET: ci-django-client-secret
          DJANGO_SECRET_KEY: ci-django-secret-key-that-is-definitely-at-least-fifty-characters-long
        run: |
          docker compose config --quiet
          node scripts/compose-smoke.mjs react node django
